name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Restore bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - run: bun run check

      - run: bun run build
        env:
          # Build needs SOMETHING for the chat route module init; the
          # client doesn't actually call OpenAI during `next build`, but
          # `getOpenAI()` runs at request time so just provide a placeholder
          # to be safe in case a future tweak runs init at build time.
          OPENAI_API_KEY: ci-placeholder
