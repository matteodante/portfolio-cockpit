# Pre-commit + pre-push hooks.
# Install once with: bunx lefthook install
# (lefthook is in `trustedDependencies` so `bun install` allows the
# postinstall script to run.)

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: '*.{ts,tsx,js,jsx,json,jsonc,css}'
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}

pre-push:
  jobs:
    - name: typecheck
      run: bun run typecheck
    - name: test
      run: bun test
